name: Build Android APK + Email

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: android-apk-main
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install deps
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Decode keystore (required for installable APK)
        run: |
          test -n "${ANDROID_KEYSTORE_BASE64}"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build release APK
        working-directory: android
        run: ./gradlew :app:assembleRelease
        env:
          ANDROID_KEYSTORE_PATH: keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Collect APK
        id: apk
        run: |
          set -euo pipefail
          APK_PATH="$(ls -1 android/app/build/outputs/apk/release/*.apk | head -n 1)"
          OUT="IdeasRestaurant-${GITHUB_SHA::7}.apk"
          cp "$APK_PATH" "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Email APK (optional)
        if: ${{ secrets.SMTP_HOST != '' && secrets.MAIL_TO != '' && secrets.MAIL_FROM != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT || '587' }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Ideas Restaurant APK (${{ github.sha }})
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          body: |
            Build listo.
            Descarga (si el adjunto falla): https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: ${{ steps.apk.outputs.path }}
