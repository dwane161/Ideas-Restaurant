name: Build Android APK + Email

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: android-apk-main
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install deps
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Decode keystore (required for installable APK)
        run: |
          test -n "${ANDROID_KEYSTORE_BASE64}"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build release APK
        working-directory: android
        run: ./gradlew :app:assembleRelease
        env:
          ANDROID_KEYSTORE_PATH: keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Collect APK
        id: apk
        run: |
          set -euo pipefail
          APK_PATH="$(ls -1 android/app/build/outputs/apk/release/*.apk | head -n 1)"
          OUT="IdeasRestaurant-${GITHUB_SHA::7}.apk"
          cp "$APK_PATH" "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Mail preflight
        if: ${{ env.SMTP_HOST != '' && env.MAIL_TO != '' && env.MAIL_FROM != '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "SMTP_HOST set: $([[ -n '${SMTP_HOST}' ]] && echo yes || echo no)"
          echo "SMTP_PORT set: $([[ -n '${SMTP_PORT}' ]] && echo yes || echo no)"
          echo "SMTP_USERNAME set: $([[ -n '${SMTP_USERNAME}' ]] && echo yes || echo no)"
          echo "SMTP_PASSWORD set: $([[ -n '${SMTP_PASSWORD}' ]] && echo yes || echo no)"
          echo "MAIL_TO set: $([[ -n '${MAIL_TO}' ]] && echo yes || echo no)"
          echo "MAIL_FROM set: $([[ -n '${MAIL_FROM}' ]] && echo yes || echo no)"
          # For SSL SMTP (465) we must use secure=true. For 587 we keep secure=false (STARTTLS).
          if [[ "${SMTP_PORT:-}" == "465" ]]; then
            echo "MAIL_SECURE=true" >> "$GITHUB_ENV"
          else
            echo "MAIL_SECURE=false" >> "$GITHUB_ENV"
          fi

      - name: Email APK (optional)
        if: ${{ env.SMTP_HOST != '' && env.MAIL_TO != '' && env.MAIL_FROM != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_HOST }}
          server_port: ${{ env.SMTP_PORT || '587' }}
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          secure: ${{ env.MAIL_SECURE }}
          subject: Ideas Restaurant APK (${{ github.sha }})
          to: ${{ env.MAIL_TO }}
          from: ${{ env.MAIL_FROM }}
          body: |
            Build listo.
            Descarga (si el adjunto falla): https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: ${{ steps.apk.outputs.path }}
